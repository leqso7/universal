name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v3

      - name: Install and Build 
        run: |
          npm ci
          CI=false npm run build
        env:
          CI: false

      - name: Deploy 
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build
